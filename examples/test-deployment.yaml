# RokoCluster demo workload
# A self-contained namespace + Deployment (3 replicas) + Service.
# Apply it to minikube and it shows up in the graph as:
#   Namespace "demo" ─contains→ Deployment "hello-roko" ─manages→ 3 Pods
#   each Pod ─contains→ Container "web", runs-on→ a Node
#   Service "hello-roko" ─targets→ those Pods (selector match)
#
#   kubectl apply -f examples/test-deployment.yaml
#   kubectl -n demo get all
#   kubectl delete -f examples/test-deployment.yaml   # tear down
---
apiVersion: v1
kind: Namespace
metadata:
  name: demo
  labels:
    app.kubernetes.io/part-of: roko-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-roko
  namespace: demo
  labels:
    app: hello-roko
    app.kubernetes.io/part-of: roko-demo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hello-roko
  template:
    metadata:
      labels:
        app: hello-roko
    spec:
      containers:
        - name: web
          image: nginxdemos/hello:plain-text
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: hello-roko
  namespace: demo
  labels:
    app: hello-roko
    app.kubernetes.io/part-of: roko-demo
spec:
  type: ClusterIP
  selector:
    app: hello-roko
  ports:
    - name: http
      port: 80
      targetPort: 80
