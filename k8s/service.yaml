apiVersion: v1
kind: Service
metadata:
  name: roko-cluster
  namespace: roko
  labels:
    app.kubernetes.io/name: roko-cluster
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: roko-cluster
  ports:
    - name: http
      port: 80
      targetPort: http
